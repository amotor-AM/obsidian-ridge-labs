<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!-- In-app webview mode. Runs before first paint so knowledge-base links can
         hide the public site chrome when opened inside an Obsidian Ridge app. -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          if (p.get('embed') === '1' || p.get('embedded') === '1') {
            document.documentElement.setAttribute('data-embed', '1');
          }
        } catch (e) {}
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Obsidian Ridge Labs: Private AI Apps for Apple</title>

    <!-- Primary Meta Tags -->
    <meta name="description" content="Private, offline-first AI apps for iPhone, iPad, and Mac. On-device transcription, finance intelligence, focus tools, and more." />
    <meta name="author" content="Obsidian Ridge Labs" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0b0d0c" />
    <meta name="color-scheme" content="dark light" />
    <meta name="generator" content="Vite" />

    <!-- Canonical -->
    <link rel="canonical" href="https://obsidianridgelabs.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Obsidian Ridge Labs" />
    <meta property="og:title" content="Obsidian Ridge Labs: Private AI Apps for Apple" />
    <meta property="og:description" content="Pure privacy. Intelligence on your terms. Private, on-device AI apps for Apple." />
    <meta property="og:url" content="https://obsidianridgelabs.com/" />
    <meta property="og:image" content="https://obsidianridgelabs.com/og-v2.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Obsidian Ridge Labs: Pure privacy. Intelligence on your terms." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Obsidian Ridge Labs: Private AI Apps for Apple" />
    <meta name="twitter:description" content="Pure privacy. Intelligence on your terms. Private, on-device AI apps for Apple." />
    <meta name="twitter:image" content="https://obsidianridgelabs.com/og-v2.png" />
    <meta name="twitter:image:alt" content="Obsidian Ridge Labs: Pure privacy. Intelligence on your terms." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Styles (Tailwind v4 + custom layers) are bundled from index.css at build time. -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
