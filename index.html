    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNL2K6W19T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

    <!-- Progressive enhancement + in-app webview mode. Runs before first paint:
         - marks <html class="js"> so scroll-reveal content is hidden only when JS can reveal it
         - ?embed=1 hides site chrome for knowledge-base deep links opened inside the apps -->
    <script>
      (function () {
        try {
          document.documentElement.classList.add('js');
          var p = new URLSearchParams(location.search);
          if (p.get('embed') === '1' || p.get('embedded') === '1') {
            document.documentElement.setAttribute('data-embed', '1');
          }
        } catch (e) {}
      })();
    </script>
