name: Nightly SEO Service

on:
  schedule:
    # Runs at 23:45 UTC every day (just before midnight)
    - cron: '45 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  update-seo:
    runs-on: ubuntu-latest
    # Secret lives in the BABYLOVEGROWTH_BLOG_API_KEY GitHub Environment.
    environment: BABYLOVEGROWTH_BLOG_API_KEY
    env:
      # Server-only BabyLoveGrowth read key used during build-time article sync.
      BABYLOVEGROWTH_BLOG_API_KEY: ${{ secrets.BABYLOVEGROWTH_BLOG_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate current sitemap artifact
        run: npm run build

      - name: Validate routes, schema, sitemap, and worker behavior
        run: npm run validate

      - name: Run SEO Nightly Script
        run: node scripts/seo-nightly.js
        env:
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}
