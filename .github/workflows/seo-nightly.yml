name: Nightly SEO Service

on:
  schedule:
    # Runs at 23:45 UTC every day (just before midnight)
    - cron: '45 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run SEO Nightly Script
        run: node scripts/seo-nightly.js
        env:
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}

      - name: Commit and Push SEO Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog.ts public/sitemap.xml
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly update of SEO timestamps"
            git push origin main
          else
            echo "No timestamp updates needed."
          fi
