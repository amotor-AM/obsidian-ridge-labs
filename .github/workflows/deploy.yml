name: Build and Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Secret lives in the BABYLOVEGROWTH_BLOG_API_KEY GitHub Environment.
    environment: BABYLOVEGROWTH_BLOG_API_KEY
    env:
      # Server-only BabyLoveGrowth read key. Never use a NEXT_PUBLIC_ prefix.
      BABYLOVEGROWTH_BLOG_API_KEY: ${{ secrets.BABYLOVEGROWTH_BLOG_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run validate:seo

      - run: npm run validate:worker

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
